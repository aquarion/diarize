included:
  - Sources
  - Tests

excluded:
  - .build

disabled_rules:
  - function_body_length

opt_in_rules:
  - empty_collection_literal
  - empty_string

line_length:
  warning: 140
  error: 200
  ignores_comments: true
  ignores_urls: true

identifier_name:
  min_length:
    warning: 1
    error: 1
  excluded:
    - id
    - i
    - j
    - k
    - n
    - r
    - s
    - t
    - v
    - h
    - m
    - p
    - u
    - wk
    - md
    - ms
    - b
    - d

function_parameter_count:
  warning: 7
  error: 10
